services:
  - type: web
    name: meg-platform-api
    runtime: node
    plan: free
    region: ohio
    buildCommand: npm install && npm run db:generate && npm run build:api
    startCommand: npm run db:prepare:production && npm run db:push:production && npm run start:api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGINS
        value: https://marcosvilalva.github.io
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: m_vilalva@hotmail.com
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFICATION_EMAIL_FROM
        value: MEG Finanças <onboarding@resend.dev>
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        sync: false
      - key: WHATSAPP_RECIPIENT
        value: 5518991160279
      - key: NOTIFICATION_CRON_SECRET
        generateValue: true
