name: MEG Daily Notifications

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send due and overdue reminders
        env:
          API_URL: ${{ vars.VITE_API_URL || 'https://meg-platform-api.onrender.com' }}
          CRON_SECRET: ${{ secrets.NOTIFICATION_CRON_SECRET }}
        run: |
          test -n "$CRON_SECRET" || { echo "NOTIFICATION_CRON_SECRET is not configured"; exit 1; }
          curl --fail-with-body --retry 3 --retry-delay 15 \
            -X POST "$API_URL/notifications/cron" \
            -H "x-cron-secret: $CRON_SECRET"
