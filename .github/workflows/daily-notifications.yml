name: MEG Smart Notifications

on:
  schedule:
    # São Paulo (UTC-3): 06:00, 12:00 e 19:00.
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      slot:
        description: Horário lógico do alerta
        required: true
        default: '06:00'
        type: choice
        options: ['06:00', '12:00', '19:00']

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send smart due and overdue reminders
        env:
          API_URL: ${{ vars.VITE_API_URL || 'https://meg-platform-api.onrender.com' }}
          CRON_SECRET: ${{ secrets.NOTIFICATION_CRON_SECRET }}
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL_SLOT: ${{ inputs.slot }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          test -n "$CRON_SECRET" || { echo "NOTIFICATION_CRON_SECRET is not configured"; exit 1; }
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then SLOT="$MANUAL_SLOT"; FORCE=true
          elif [ "$SCHEDULE" = "0 9 * * *" ]; then SLOT="06:00"; FORCE=false
          elif [ "$SCHEDULE" = "0 15 * * *" ]; then SLOT="12:00"; FORCE=false
          else SLOT="19:00"; FORCE=false; fi
          echo "Triggering MEG notification slot $SLOT (force=$FORCE)"
          curl --fail-with-body --retry 3 --retry-delay 15 \
            -X POST "$API_URL/notifications/cron" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --data "{\"slot\":\"$SLOT\",\"force\":$FORCE}"
