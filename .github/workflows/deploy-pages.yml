name: Deploy MEG Platform to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build production web application
        env:
          VITE_APP_ENV: production
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://meg-platform-api.onrender.com' }}
          VITE_PUBLIC_BASE_PATH: /MEG-Platform/
        run: npm run build:web

      - name: Stage production artifact
        run: |
          rm -rf pages-artifact
          mkdir -p pages-artifact
          cp -r apps/web/dist/. pages-artifact/

      - name: Build isolated staging web application
        env:
          VITE_APP_ENV: staging
          VITE_VALIDATION_MODE: 'false'
          VITE_PUBLIC_BASE_PATH: /MEG-Platform/staging/
          VITE_API_URL: ${{ vars.VITE_STAGING_API_URL || vars.VITE_API_URL || 'https://meg-platform-api.onrender.com' }}
          VITE_STAGING_ADMIN_EMAIL: ${{ vars.VITE_STAGING_ADMIN_EMAIL || 'm_vilalva@hotmail.com' }}
        run: npm run build:web

      - name: Stage isolated staging artifact
        run: |
          mkdir -p pages-artifact/staging
          cp -r apps/web/dist/. pages-artifact/staging/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-artifact

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
