name: Build MEG Finanças Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-android-apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    if: ${{ !contains(github.event.head_commit.message, '[skip apk]') }}
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: https://meg-platform-api.onrender.com
      VITE_MOBILE_APP: 'true'
      CAPACITOR_BUILD: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build mobile web application
        run: npm run build:web

      - name: Remove previous APK from mobile web assets
        run: rm -f apps/web/dist/downloads/MEG-Financas.apk

      - name: Synchronize Android project
        run: npx cap sync android

      - name: Build installable APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Name APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk MEG-Financas.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MEG-Financas-Android
          path: MEG-Financas.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish latest APK on the website
        if: github.actor != 'github-actions[bot]'
        run: |
          cp MEG-Financas.apk apps/web/public/downloads/MEG-Financas.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/downloads/MEG-Financas.apk
          git diff --cached --quiet || git commit -m "chore: publicar APK atualizado [skip apk]"
          git push
