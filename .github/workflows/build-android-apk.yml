name: Build MEG Finanças Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-android-apk.yml'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: https://meg-platform-api.onrender.com
      VITE_MOBILE_APP: 'true'
      CAPACITOR_BUILD: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build mobile web application
        run: npm run build:web

      - name: Synchronize Android project
        run: npx cap sync android

      - name: Build installable APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Name APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk MEG-Financas.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MEG-Financas-Android
          path: MEG-Financas.apk
          if-no-files-found: error
          retention-days: 90
